services:
  - type: web
    name: bookmyticket
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server/index.js
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.20.0
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: OTP_DEBUG_PREVIEW
        value: "false"
      - key: DB_PATH
        value: /tmp/bookmyticket.db
